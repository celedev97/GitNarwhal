name: CI / CD

on:
  push:
    branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:

permissions:
  contents: write

jobs:

  # ── Tests (every push / PR) ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: ./gradlew test --no-daemon

  # ── Linux .deb (tag only) ───────────────────────────────────────────────────
  build-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: linux-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: linux-gradle-

      - name: Derive version
        id: ver
        run: echo "V=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build shadow JAR
        run: ./gradlew "-PappVersion=${{ steps.ver.outputs.V }}" shadowJar --no-daemon

      - name: Create .deb
        run: |
          jpackage \
            --type deb \
            --name gitnarwhal \
            --app-version "${{ steps.ver.outputs.V }}" \
            --input build/libs \
            --main-jar gitnarwhal.jar \
            --main-class com.gitnarwhal.MainKt \
            --dest dist \
            --icon src/main/resources/icon.png \
            --linux-shortcut \
            --linux-app-category "Development"

      - name: Rename output
        run: |
          mv dist/gitnarwhal_${{ steps.ver.outputs.V }}_amd64.deb \
             dist/gitnarwhal-${{ steps.ver.outputs.V }}-linux-x64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/gitnarwhal-*-linux-x64.deb

  # ── macOS .dmg (tag only) ───────────────────────────────────────────────────
  build-mac:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: mac-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: mac-gradle-

      - name: Derive version
        id: ver
        run: echo "V=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build shadow JAR
        run: ./gradlew "-PappVersion=${{ steps.ver.outputs.V }}" shadowJar --no-daemon

      - name: Convert icon to .icns
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src/main/resources/icon.png \
              --out icon.iconset/icon_${size}x${size}.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Create .dmg
        run: |
          jpackage \
            --type dmg \
            --name GitNarwhal \
            --app-version "${{ steps.ver.outputs.V }}" \
            --input build/libs \
            --main-jar gitnarwhal.jar \
            --main-class com.gitnarwhal.MainKt \
            --dest dist \
            --icon icon.icns

      - name: Rename output
        run: |
          mv "dist/GitNarwhal-${{ steps.ver.outputs.V }}.dmg" \
             "dist/gitnarwhal-${{ steps.ver.outputs.V }}-mac-x64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/gitnarwhal-*-mac-x64.dmg

  # ── Windows .exe installer (tag only) ──────────────────────────────────────
  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: actions/cache@v4
        with:
          path: |
            ~\.gradle\caches
            ~\.gradle\wrapper
            .gradle\jre
          key: windows-gradle-jre-${{ hashFiles('**/*.gradle*') }}
          restore-keys: windows-gradle-jre-

      - name: Derive version
        id: ver
        shell: bash
        run: echo "V=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows bundle
        run: .\gradlew.bat "-PappVersion=${{ steps.ver.outputs.V }}" win64app --no-daemon

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Stage installer files
        shell: pwsh
        run: |
          $v   = "${{ steps.ver.outputs.V }}"
          $dir = "build\innosetup"
          New-Item -ItemType Directory -Force $dir | Out-Null

          Copy-Item -Recurse "build\app\windows_x64\*" "$dir\"
          Copy-Item "gradle\innosetup\inno.iss" "$dir\inno.iss"
          Copy-Item "gradle\innosetup\icon.ico"  "$dir\icon.ico"

          (Get-Content "$dir\inno.iss") `
            -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$v`"" |
            Set-Content "$dir\inno.iss"

      - name: Run Inno Setup
        shell: cmd
        run: >
          "%programfiles(x86)%\Inno Setup 6\ISCC.exe"
          "build\innosetup\inno.iss"

      - name: Rename output
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.V }}"
          Rename-Item "build\innosetup\Output\gitnarwhal-setup.exe" `
                      "gitnarwhal-$v-windows-x64-setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build\innosetup\Output\gitnarwhal-*-setup.exe

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [ build-linux, build-mac, build-windows ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with: { name: linux-deb,         path: dist }
      - uses: actions/download-artifact@v4
        with: { name: mac-dmg,           path: dist }
      - uses: actions/download-artifact@v4
        with: { name: windows-installer, path: dist }

      - uses: ncipollo/release-action@v1
        with:
          tag:                  ${{ github.ref_name }}
          name:                 ${{ github.ref_name }}
          artifacts:            "dist/*"
          generateReleaseNotes: true
          prerelease:           false
          token:                ${{ secrets.GITHUB_TOKEN }}
