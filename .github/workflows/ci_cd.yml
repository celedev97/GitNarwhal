on: push

jobs:
  #Unit test
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run tests
      run: ./gradlew test --no-daemon

  #Jar creation
  jar:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Create Jar
      run: ./gradlew shadowJar --no-daemon

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: shadowJar
        path: ./build/libs/gitnarwhal.jar

  #Native images per OS — built on matching runners
  bundle:
    if: github.ref == 'refs/heads/release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            task: linux64app
            artifact: linux_x64_image
            path: ./build/app/linux_x64
          - os: windows-latest
            task: win64app
            artifact: windows_x64_image
            path: ./build/app/windows_x64
          - os: macos-latest
            task: mac64app
            artifact: mac_x64_image
            path: ./build/app/mac_x64
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Bundle JAR with JRE and launcher script
      run: ./gradlew ${{ matrix.task }} --stacktrace --no-daemon

    - name: Upload image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.path }}
