# Global FlatLaf overrides for GitNarwhal — picked up via
# FlatLaf.registerCustomDefaultsSource("com.gitnarwhal.themes")

# Window title bar
TitlePane.unifiedBackground=false
TitlePane.showIcon=true
TitlePane.iconSize=24,24
TitlePane.buttonSize=44,30

# Tabs
TabbedPane.showTabSeparators=true
TabbedPane.tabHeight=32

# Tables
Table.rowHeight=22
Table.intercellSpacing=0,0
Table.showHorizontalLines=false
Table.showVerticalLines=false

# Tree
Tree.rowHeight=22

# Buttons get a slightly rounder feel
Button.arc=8
Component.arc=6
TextComponent.arc=6

# Monospace font for hash/code display
[win]monospaced.font = 12 "Consolas",Monospaced
[mac]monospaced.font = 12 "Menlo",Monospaced
[linux]monospaced.font = 12 "DejaVu Sans Mono",Monospaced
