name: CI / CD

on:
  push:
    branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:

permissions:
  contents: write   # needed to create GitHub releases

jobs:

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

  # ── Release (tags only) ─────────────────────────────────────────────────────
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/jre
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-release-

      - name: Derive version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platform bundles
        run: |
          ./gradlew \
            -PappVersion=${{ steps.version.outputs.VERSION }} \
            win64app linux64app mac64app \
            --no-daemon --stacktrace

      - name: Package bundles as ZIPs
        run: |
          cd build/app
          zip -r ../../gitnarwhal-${{ steps.version.outputs.VERSION }}-windows-x64.zip  windows_x64/
          zip -r ../../gitnarwhal-${{ steps.version.outputs.VERSION }}-linux-x64.zip    linux_x64/
          zip -r ../../gitnarwhal-${{ steps.version.outputs.VERSION }}-mac-x64.zip      mac_x64/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:          ${{ github.ref_name }}
          name:         ${{ github.ref_name }}
          artifacts:    "gitnarwhal-*.zip"
          generateReleaseNotes: true
          prerelease:   false
          token:        ${{ secrets.GITHUB_TOKEN }}
